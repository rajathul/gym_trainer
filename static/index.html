<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAINER — AI Form Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ══ Reset & variables ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:  #f6f6f6;
      --silver: #e0dbf3;
      --amber:  #f3ba60;
      --dream:  #b6b1c0;
      --haze:   #736a6a;
      --lead:   #202022;
      --green:  #3ecf8e;
      --red:    #f05252;
      --blue:   #60a5f3;
      --r:      10px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--lead);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ══ Exercise selection overlay ══════════════════════════════ */
    .exercise-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--lead);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fade-in 0.35s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .exercise-modal.hidden {
      display: none;
    }

    .exercise-modal-inner {
      text-align: center;
      padding: 48px 32px;
      max-width: 620px;
      width: 100%;
    }

    .modal-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .modal-logo-mark {
      width: 44px;
      height: 44px;
      background: var(--amber);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .modal-logo-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--white);
    }

    .modal-logo-text em { font-style: normal; color: var(--amber); }

    .modal-subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--dream);
      letter-spacing: 0.08em;
      margin-bottom: 40px;
    }

    .exercise-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .exercise-btn {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 28px 16px 24px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--white);
    }

    .exercise-btn:hover {
      border-color: var(--amber);
      background: rgba(243,186,96,0.08);
      transform: translateY(-2px);
    }

    .exercise-btn:active { transform: scale(0.97); }

    .exercise-btn-icon {
      font-size: 2.8rem;
      line-height: 1;
    }

    .exercise-btn-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--white);
    }

    .exercise-btn-desc {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--dream);
      text-transform: uppercase;
    }

    .exercise-btn-tag {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(243,186,96,0.7);
      background: rgba(243,186,96,0.1);
      border: 1px solid rgba(243,186,96,0.2);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* ══ Header ══════════════════════════════════════════════════ */
    header {
      height: 58px;
      flex-shrink: 0;
      background: var(--lead);
      border-bottom: 2px solid var(--amber);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
      position: relative;
      z-index: 20;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.06em;
      color: var(--white);
      user-select: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--amber);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .logo em { font-style: normal; color: var(--amber); }

    .header-center {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    /* Exercise pill shown in header */
    .exercise-pill {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      background: rgba(243,186,96,0.12);
      border: 1px solid rgba(243,186,96,0.25);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .exercise-pill:hover { background: rgba(243,186,96,0.2); }

    .timer {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--dream);
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 5px 12px;
      border-radius: 6px;
    }

    .status { display: flex; align-items: center; gap: 7px; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--haze);
      flex-shrink: 0;
      transition: background 0.4s;
    }

    .status-dot.live {
      background: var(--green);
      animation: ripple 1.8s infinite;
    }

    @keyframes ripple {
      0%   { box-shadow: 0 0 0 0 rgba(62,207,142,0.55); }
      70%  { box-shadow: 0 0 0 8px rgba(62,207,142,0); }
      100% { box-shadow: 0 0 0 0 rgba(62,207,142,0); }
    }

    .status-text {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--haze);
      transition: color 0.4s;
    }

    .status-text.live { color: var(--green); }

    .btn-reset {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dream);
      background: transparent;
      border: 1.5px solid rgba(182,177,192,0.28);
      border-radius: 7px;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, transform 0.1s;
    }

    .btn-reset:hover  { border-color: var(--amber); color: var(--amber); }
    .btn-reset:active { transform: scale(0.95); }

    /* ══ Main layout ══════════════════════════════════════════════ */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 60fr 40fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ══ Video panel ═════════════════════════════════════════════ */
    .video-panel {
      background: var(--lead);
      position: relative;
      overflow: hidden;
    }

    #videoFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(32,32,34,0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .video-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 2;
      background: rgba(32,32,34,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(243,186,96,0.22);
      border-radius: 8px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .video-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .video-badge-text {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(246,246,246,0.65);
    }

    /* ══ Stats panel ══════════════════════════════════════════════ */
    .stats-panel {
      background: var(--white);
      border-left: 1px solid var(--silver);
      overflow-y: auto;
      padding: 18px 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--silver) transparent;
    }

    /* ══ Rep card ═════════════════════════════════════════════════ */
    .rep-card {
      background: var(--lead);
      border-radius: var(--r);
      padding: 20px 20px 18px;
      text-align: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .rep-card::before {
      content: '';
      position: absolute;
      top: -50px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(243,186,96,0.16) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .rep-eyebrow {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--haze);
      margin-bottom: 4px;
    }

    .rep-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 5.5rem;
      line-height: 1;
      color: var(--amber);
      text-shadow: 0 0 50px rgba(243,186,96,0.28);
      transition: transform 0.14s cubic-bezier(0.34,1.56,0.64,1);
    }

    .rep-number.bump { transform: scale(1.16); }

    .rep-unit {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--haze);
      margin-top: 2px;
    }

    /* ══ Metrics grid ════════════════════════════════════════════ */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex-shrink: 0;
    }

    .metric-card {
      background: var(--white);
      border: 1.5px solid var(--silver);
      border-radius: var(--r);
      padding: 14px 15px;
    }

    .metric-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.17em;
      text-transform: uppercase;
      color: var(--dream);
      margin-bottom: 5px;
    }

    .metric-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.85rem;
      line-height: 1;
      color: var(--lead);
      transition: color 0.3s;
    }

    .metric-value.up   { color: var(--green); }
    .metric-value.down { color: var(--amber); }
    .metric-value.idle { color: var(--dream); }

    /* ══ Form section ════════════════════════════════════════════ */
    .section-header {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--haze);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--silver);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .form-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .form-card {
      background: var(--white);
      border: 1.5px solid var(--silver);
      border-left: 3px solid var(--dream);
      border-radius: var(--r);
      padding: 11px 13px;
      display: flex;
      align-items: center;
      gap: 11px;
      transition: border-color 0.32s, border-left-color 0.32s, background 0.32s;
    }

    .form-card.ok   { border-color: rgba(62,207,142,0.3); border-left-color: var(--green); background: rgba(62,207,142,0.03); }
    .form-card.fail { border-color: rgba(240,82,82,0.3);  border-left-color: var(--red);   background: rgba(240,82,82,0.03); }

    .form-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      background: var(--silver);
      color: var(--dream);
      transition: background 0.32s, color 0.32s;
    }

    .form-card.ok   .form-icon { background: rgba(62,207,142,0.15); color: var(--green); }
    .form-card.fail .form-icon { background: rgba(240,82,82,0.15);  color: var(--red); }

    .form-body { flex: 1; min-width: 0; }

    .form-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--lead);
      margin-bottom: 2px;
    }

    .form-msg {
      font-size: 0.68rem;
      color: var(--haze);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.32s;
    }

    .form-card.fail .form-msg { color: rgba(240,82,82,0.85); }

    .form-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-radius: 5px;
      flex-shrink: 0;
      background: rgba(182,177,192,0.18);
      color: var(--dream);
      transition: background 0.32s, color 0.32s;
    }

    .form-card.ok   .form-badge { background: rgba(62,207,142,0.14); color: var(--green); }
    .form-card.fail .form-badge { background: rgba(240,82,82,0.14);  color: var(--red); }

    /* ══ AI Coach card ════════════════════════════════════════════ */
    .tip-card {
      background: var(--lead);
      border-radius: var(--r);
      padding: 20px 20px 18px;
      flex-shrink: 0;
      border: 1px solid rgba(243,186,96,0.18);
      position: relative;
      overflow: hidden;
    }

    .tip-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(243,186,96,0.06) 0%, transparent 55%);
      pointer-events: none;
    }

    .tip-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tip-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
    }

    .tip-badge {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(243,186,96,0.55);
      background: rgba(243,186,96,0.09);
      border: 1px solid rgba(243,186,96,0.18);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .tip-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      color: var(--white);
      letter-spacing: 0.01em;
      transition: opacity 0.25s;
      min-height: 2.3rem;
    }

    .tip-reason {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--dream);
      line-height: 1.5;
      margin-top: 8px;
      transition: opacity 0.25s;
    }

    .tip-text.loading,
    .tip-reason.loading { opacity: 0.3; }

    .typing-dots {
      display: none;
      gap: 5px;
      align-items: center;
      margin-top: 10px;
    }

    .typing-dots.visible { display: flex; }

    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--amber);
      border-radius: 50%;
      animation: dot-bounce 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%           { transform: scale(1);    opacity: 1; }
    }

    /* ══ Divider & history ════════════════════════════════════════ */
    .divider { height: 1px; background: var(--silver); flex-shrink: 0; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--silver);
      flex-shrink: 0;
    }

    .history-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--haze);
    }

    .history-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--dream);
      background: var(--silver);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .history-list { display: flex; flex-direction: column; gap: 7px; flex-shrink: 0; }

    .history-empty {
      text-align: center;
      font-size: 0.72rem;
      color: var(--dream);
      padding: 18px 0 8px;
      font-style: italic;
    }

    .history-entry {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--white);
      border: 1.5px solid var(--silver);
      border-left: 3px solid var(--dream);
      border-radius: 8px;
      padding: 9px 12px;
      animation: slide-in 0.2s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .history-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .history-rep {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--amber);
      background: rgba(243,186,96,0.12);
      border: 1px solid rgba(243,186,96,0.2);
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .history-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--dream);
    }

    .history-text { font-size: 0.8rem; font-weight: 600; color: var(--lead); line-height: 1.4; flex: 1; }
    .history-reason { font-size: 0.7rem; font-weight: 400; color: var(--haze); line-height: 1.4; margin-top: 3px; }
  </style>
</head>

<body>

<!-- ──────────── Exercise Selection Overlay ──────────── -->
<div id="exerciseModal" class="exercise-modal">
  <div class="exercise-modal-inner">
    <div class="modal-logo">
      <div class="modal-logo-mark">🏋</div>
      <div class="modal-logo-text">FORM <em>TRAINER</em></div>
    </div>
    <div class="modal-subtitle">Powered by MediaPipe · Groq · Llama 3.1</div>

    <div class="exercise-grid">
      <button class="exercise-btn" onclick="selectExercise('squat')">
        <div class="exercise-btn-icon">🏋️</div>
        <div class="exercise-btn-name">SQUAT</div>
        <div class="exercise-btn-desc">Knees · Depth · Back</div>
        <div class="exercise-btn-tag">Squat Prompt</div>
      </button>
      <button class="exercise-btn" onclick="selectExercise('pushup')">
        <div class="exercise-btn-icon">💪</div>
        <div class="exercise-btn-name">PUSH-UP</div>
        <div class="exercise-btn-desc">Body Line · Elbows</div>
        <div class="exercise-btn-tag">Multi-Ex Prompt</div>
      </button>
      <button class="exercise-btn" onclick="selectExercise('lunge')">
        <div class="exercise-btn-icon">🦵</div>
        <div class="exercise-btn-name">LUNGE</div>
        <div class="exercise-btn-desc">Knee · Torso · Depth</div>
        <div class="exercise-btn-tag">Multi-Ex Prompt</div>
      </button>
    </div>
  </div>
</div>

<!-- ──────────── Main App ──────────── -->
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-mark" id="headerIcon">🏋</div>
      FORM <em>TRAINER</em>
    </div>

    <div class="header-center">
      <span class="exercise-pill" id="exercisePill" onclick="showExerciseModal()" title="Change exercise">SQUAT</span>
      <div class="timer" id="timer">00:00</div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">No Signal</span>
      </div>
    </div>

    <button class="btn-reset" onclick="resetSession()">↺&nbsp; Reset</button>
  </header>

  <div class="main">

    <!-- Video panel -->
    <div class="video-panel">
      <img id="videoFeed" src="/video_feed" alt="Live camera feed" />
      <div class="video-badge">
        <div class="video-badge-dot"></div>
        <span class="video-badge-text">Live · MediaPipe Pose</span>
      </div>
    </div>

    <!-- Stats panel -->
    <aside class="stats-panel">

      <div class="rep-card">
        <div class="rep-eyebrow">Completed</div>
        <div class="rep-number" id="repCount">0</div>
        <div class="rep-unit" id="repUnit">Squats</div>
      </div>

      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Phase</div>
          <div class="metric-value idle" id="phaseVal">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label" id="angleLabel">Knee Angle</div>
          <div class="metric-value" id="angleVal">—</div>
        </div>
      </div>

      <div class="tip-card">
        <div class="tip-header">
          <div class="tip-label">⚡ AI Coach</div>
          <div class="tip-badge" id="promptBadge">Groq · Squat Prompt</div>
        </div>
        <div class="tip-text" id="tipText">Select an exercise to begin</div>
        <div class="tip-reason" id="tipReason"></div>
        <div class="typing-dots" id="typingDots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="section-header">Form Analysis</div>

      <div class="form-cards" id="formCards">
        <!-- Rendered dynamically based on exercise -->
      </div>

      <div class="divider"></div>

      <div class="history-header">
        <span class="history-title">Session Log</span>
        <span class="history-count" id="historyCount">0</span>
      </div>

      <div class="history-list" id="historyList">
        <div class="history-empty" id="historyEmpty">No feedback yet — start your exercise</div>
      </div>

    </aside>
  </div>
</div>

<script>
  /* ── Exercise config ───────────────────────────────────────── */
  const EXERCISE_CONFIG = {
    squat: {
      icon:        '🏋️',
      label:       'SQUAT',
      repUnit:     'Squats',
      angleLabel:  'Knee Angle',
      promptBadge: 'Groq · Squat Prompt',
      idleMsg:     'Stand in frame with your full body visible. Begin squatting when ready.',
      cards: [
        { key: 'depth',  icon: '📐', name: 'Squat Depth',      okMsg: 'Good depth — parallel achieved'         },
        { key: 'knees',  icon: '🦵', name: 'Knee Cave',        okMsg: 'Knees tracking wide over toes'          },
        { key: 'asym',   icon: '⚖️', name: 'Knee Symmetry',    okMsg: 'Both knees bending evenly'              },
        { key: 'stance', icon: '↔️', name: 'Stance Width',     okMsg: 'Foot width looks good'                  },
        { key: 'back',   icon: '🧍', name: 'Back / Torso',     okMsg: 'Spine neutral, chest tall'              },
      ],
    },
    pushup: {
      icon:        '💪',
      label:       'PUSH-UP',
      repUnit:     'Push-ups',
      angleLabel:  'Elbow Angle',
      promptBadge: 'Groq · Multi-Ex Prompt',
      idleMsg:     'Get into push-up position with your full body visible. Begin when ready.',
      cards: [
        { key: 'hips',       icon: '📏', name: 'Body Line',       okMsg: 'Hips aligned — great plank'         },
        { key: 'elbows',     icon: '💪', name: 'Elbow Tuck',      okMsg: 'Elbows tracking at 45°'             },
        { key: 'depth',      icon: '📐', name: 'Depth',           okMsg: 'Good depth — chest near floor'      },
        { key: 'elbow_asym', icon: '⚖️', name: 'Arm Symmetry',   okMsg: 'Both arms pushing evenly'           },
      ],
    },
    lunge: {
      icon:        '🦵',
      label:       'LUNGE',
      repUnit:     'Lunges',
      angleLabel:  'Knee Angle',
      promptBadge: 'Groq · Multi-Ex Prompt',
      idleMsg:     'Stand in frame with your full body visible. Begin lunging when ready.',
      cards: [
        { key: 'depth', icon: '📐', name: 'Lunge Depth',    okMsg: 'Good depth — back knee near floor'   },
        { key: 'knee',  icon: '🦵', name: 'Knee Alignment', okMsg: 'Front knee tracking over toes'       },
        { key: 'back',  icon: '🧍', name: 'Torso Posture',  okMsg: 'Staying upright — great posture'     },
      ],
    },
  };

  /* ── State ─────────────────────────────────────────────────── */
  let currentExercise = 'squat';
  let prevReps        = 0;
  let sessionStart    = Date.now();
  let lastFeedback    = null;
  let historyCount    = 0;

  /* ── Exercise selection ────────────────────────────────────── */
  async function selectExercise(exercise) {
    await fetch('/set_exercise', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ exercise }),
    });

    currentExercise = exercise;
    document.getElementById('exerciseModal').classList.add('hidden');
    applyExerciseUI(exercise);
    resetLocalState();
  }

  function showExerciseModal() {
    document.getElementById('exerciseModal').classList.remove('hidden');
  }

  function applyExerciseUI(exercise) {
    const cfg = EXERCISE_CONFIG[exercise];
    document.getElementById('headerIcon').textContent   = cfg.icon;
    document.getElementById('exercisePill').textContent = cfg.label;
    document.getElementById('repUnit').textContent      = cfg.repUnit;
    document.getElementById('angleLabel').textContent   = cfg.angleLabel;
    document.getElementById('promptBadge').textContent  = cfg.promptBadge;
    document.getElementById('tipText').textContent      = cfg.idleMsg;
    document.getElementById('tipReason').textContent    = '';
    renderFormCards(exercise);
  }

  function renderFormCards(exercise) {
    const cfg  = EXERCISE_CONFIG[exercise];
    const container = document.getElementById('formCards');
    container.innerHTML = cfg.cards.map(c => `
      <div class="form-card" id="card-${c.key}">
        <div class="form-icon" id="icon-${c.key}">${c.icon}</div>
        <div class="form-body">
          <div class="form-name">${c.name}</div>
          <div class="form-msg" id="msg-${c.key}">Waiting for movement…</div>
        </div>
        <div class="form-badge" id="badge-${c.key}">—</div>
      </div>
    `).join('');
  }

  /* ── History helpers ───────────────────────────────────────── */
  function addHistoryEntry(cue, reason, reps) {
    const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
    const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const ss = String(elapsed % 60).padStart(2, '0');

    document.getElementById('historyEmpty')?.remove();

    const entry = document.createElement('div');
    entry.className = 'history-entry';
    entry.innerHTML = `
      <div class="history-meta">
        <span class="history-rep">Rep&nbsp;${reps}</span>
        <span class="history-time">${mm}:${ss}</span>
      </div>
      <div style="flex:1;min-width:0;">
        <div class="history-text">${cue}</div>
        ${reason ? `<div class="history-reason">${reason}</div>` : ''}
      </div>`;

    document.getElementById('historyList').prepend(entry);
    historyCount++;
    document.getElementById('historyCount').textContent = historyCount;
  }

  function clearHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = '<div class="history-empty" id="historyEmpty">No feedback yet — start your exercise</div>';
    historyCount = 0;
    document.getElementById('historyCount').textContent = 0;
    lastFeedback = null;
  }

  function resetLocalState() {
    prevReps     = 0;
    sessionStart = Date.now();
    document.getElementById('repCount').textContent = '0';
    clearHistory();
  }

  /* ── Session timer ─────────────────────────────────────────── */
  setInterval(() => {
    const s  = Math.floor((Date.now() - sessionStart) / 1000);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${mm}:${ss}`;
  }, 1000);

  /* ── WebSocket ─────────────────────────────────────────────── */
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws    = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onmessage = (e) => updateUI(JSON.parse(e.data));
    ws.onclose   = () => setTimeout(connectWS, 1500);
    ws.onerror   = () => ws.close();
  }

  connectWS();

  /* ── Reset ─────────────────────────────────────────────────── */
  async function resetSession() {
    await fetch('/reset', { method: 'POST' });
    resetLocalState();
    const cfg = EXERCISE_CONFIG[currentExercise];
    document.getElementById('tipText').textContent   = cfg.idleMsg;
    document.getElementById('tipReason').textContent = '';
  }

  /* ── Update UI ─────────────────────────────────────────────── */
  function updateUI(d) {
    /* Status */
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (d.active) {
      dot.classList.add('live'); txt.classList.add('live'); txt.textContent = 'Detecting';
    } else {
      dot.classList.remove('live'); txt.classList.remove('live'); txt.textContent = 'No Signal';
    }

    /* Rep counter */
    const repEl = document.getElementById('repCount');
    if (d.reps !== prevReps) {
      repEl.classList.add('bump');
      setTimeout(() => repEl.classList.remove('bump'), 220);
      prevReps = d.reps;
    }
    repEl.textContent = d.reps;

    /* Phase */
    const phaseEl = document.getElementById('phaseVal');
    phaseEl.className = 'metric-value';
    if (d.stage === 'up') {
      phaseEl.textContent = 'UP';   phaseEl.classList.add('up');
    } else if (d.stage === 'down') {
      phaseEl.textContent = 'DOWN'; phaseEl.classList.add('down');
    } else {
      phaseEl.textContent = '—';    phaseEl.classList.add('idle');
    }

    /* Primary angle (knee or elbow depending on exercise) */
    document.getElementById('angleVal').textContent = d.active ? `${d.primary_angle}°` : '—';

    /* Form cards — only update keys that exist in the DOM */
    const cfg = EXERCISE_CONFIG[d.exercise] || EXERCISE_CONFIG['squat'];
    for (const cardDef of cfg.cards) {
      const key   = cardDef.key;
      const entry = d.form[key];
      const card  = document.getElementById(`card-${key}`);
      const icon  = document.getElementById(`icon-${key}`);
      const msg   = document.getElementById(`msg-${key}`);
      const badge = document.getElementById(`badge-${key}`);
      if (!card) continue;

      if (!entry) {
        card.className   = 'form-card';
        icon.textContent = cardDef.icon;
        msg.textContent  = 'Waiting for movement…';
        badge.textContent = '—';
      } else if (entry.ok) {
        card.className   = 'form-card ok';
        icon.textContent = '✓';
        msg.textContent  = cardDef.okMsg;
        badge.textContent = 'OK';
      } else {
        card.className   = 'form-card fail';
        icon.textContent = '✗';
        msg.textContent  = entry.msg;
        badge.textContent = 'FIX';
      }
    }

    /* AI Coach */
    const tipEl    = document.getElementById('tipText');
    const reasonEl = document.getElementById('tipReason');
    const dotsEl   = document.getElementById('typingDots');

    if (d.llm_loading) {
      tipEl.classList.add('loading');
      reasonEl.classList.add('loading');
      dotsEl.classList.add('visible');
    } else {
      tipEl.classList.remove('loading');
      reasonEl.classList.remove('loading');
      dotsEl.classList.remove('visible');

      if (d.llm_cue) {
        if (d.llm_cue !== lastFeedback) {
          addHistoryEntry(d.llm_cue, d.llm_reason, d.reps);
          lastFeedback = d.llm_cue;
        }
        tipEl.textContent    = d.llm_cue;
        reasonEl.textContent = d.llm_reason || '';
      } else if (!d.active) {
        tipEl.textContent    = cfg.idleMsg;
        reasonEl.textContent = '';
      }
    }
  }

  /* ── Init ──────────────────────────────────────────────────── */
  renderFormCards('squat');
</script>
</body>
</html>
